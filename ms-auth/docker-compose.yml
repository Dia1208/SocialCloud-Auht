version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-socialcloud-auth
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: socialcloud_auth
    ports:
      - "3306:3306"
    restart: always

  ms-auth:
    build: .
    container_name: ms-auth
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/socialcloud_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
    restart: always
